# Icon mapping for tag terms displayed on the /tags/ vocabulary index.
#
# - type: "logo" → uses assets/img/logos/<file>.svg (original brand color)
# - type: "fa"  → uses Font Awesome class "fa-<class>" (already loaded)
#
# Brand logos are sourced from SimpleIcons (https://simpleicons.org/), CC0.
# Abstract concepts use Font Awesome 6.7.2 free icons.
