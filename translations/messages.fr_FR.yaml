expertise_heading: "Qui suis-je ?"
expertise_intro: "Expert Symfony certifié versions 6 et 7, je me spécialise dans les architectures complexes et les projets techniques ambitieux. J'ai modernisé des intranets bancaires historiques, développé des backends DDD déployés sur AWS Lambda pour de grands éditeurs de presse, et accompagné des migrations critiques pour les services publics. En parallèle, j'ai travaillé intensivement avec AWS (Lambda, SNS, SQS, CloudFront, SAM), ElasticSearch, Redis, RabbitMQ et tout l'écosystème Symfony — plus de 10 ans dans la banque, les services publics, l'e-commerce et la presse."
expertise_outro: "Au-delà du code, j'écris sur les vrais problèmes que je rencontre chaque article est une expérience que j'aurais aimé trouver plus tôt. Vous retrouvez les ci-dessous."
